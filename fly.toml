# fly.toml app configuration file generated for cd-store-backend
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'cd-store-backend'
primary_region = 'sin' # Singapore (tối ưu tốc độ cho Việt Nam & Châu Á)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
